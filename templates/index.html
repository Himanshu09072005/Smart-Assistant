```html
<!DOCTYPE html>
<html>

<head>

<title>Smart AI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b1220">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<style>

/* -------- GLOBAL -------- */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
color:white;
}

/* -------- SPLASH -------- */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#splash h1{
font-size:32px;
margin-bottom:10px;
}

/* -------- SIDEBAR -------- */

#sidebar{
width:260px;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(15px);
padding:20px;
display:flex;
flex-direction:column;
}

#sidebar h2{
margin-top:0;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:5px;
background:rgba(255,255,255,0.05);
}

.chat-item:hover{
background:rgba(255,255,255,0.15);
}

/* -------- MAIN -------- */

#main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

#chatbox{
flex:1;
overflow-y:auto;
padding:10px;
margin-top:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

/* -------- MESSAGES -------- */

.user-message{
background:#2563eb;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
margin-left:auto;
}

.bot-message{
background:#334155;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
}

/* -------- INPUT -------- */

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

#userInput{
flex:1;
padding:12px;
border-radius:6px;
border:none;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* -------- INSTALL BUTTON -------- */

#installBtn{
display:none;
background:#16a34a;
}

/* -------- TYPING -------- */

.typing span{
animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* -------- LIGHT THEME -------- */

.light{
background:#f1f5f9;
color:black;
}

.light #sidebar{
background:#e2e8f0;
}

.light #chatbox{
background:#f8fafc;
}

</style>

</head>

<body>

<div id="splash">
<h1>Smart AI Assistant</h1>
<p>Loading intelligent assistant...</p>
</div>

<div id="sidebar">

<h2>Chats</h2>

<button onclick="newChat()">New Chat</button>

<div id="chatHistory"></div>

</div>

<div id="main">

<header>

<h2>Smart Assistant</h2>

<div>
<button onclick="toggleTheme()">Theme</button>
<button id="installBtn">Install</button>
</div>

</header>

<div id="chatbox"></div>

<div id="inputArea">

<input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">

<button onclick="voiceInput()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* splash */

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none"
},1500)
})

/* enter */

function handleKey(e){
if(e.key==="Enter") sendMessage()
}

/* chats */

let chats={}
let currentChat="chat1"

function newChat(){

currentChat="chat"+Date.now()
chats[currentChat]=[]

renderHistory()
document.getElementById("chatbox").innerHTML=""

}

/* sidebar */

function renderHistory(){

const history=document.getElementById("chatHistory")
history.innerHTML=""

Object.keys(chats).forEach(id=>{

const div=document.createElement("div")
div.className="chat-item"
div.innerText=id
div.onclick=()=>loadChat(id)

history.appendChild(div)

})

}

function loadChat(id){

currentChat=id
const chatbox=document.getElementById("chatbox")
chatbox.innerHTML=""

chats[id].forEach(m=>{
chatbox.innerHTML+=m
})

}

/* theme */

function toggleTheme(){
document.body.classList.toggle("light")
}

/* voice input */

function voiceInput(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-US"

recognition.onresult=(e)=>{
document.getElementById("userInput").value=e.results[0][0].transcript
}

recognition.start()

}

/* send message */

async function sendMessage(){

const input=document.getElementById("userInput")
const message=input.value.trim()

if(!message) return

const chatbox=document.getElementById("chatbox")

const userHTML=`<div class="user-message"><b>You:</b> ${message}</div>`

chatbox.innerHTML+=userHTML

chats[currentChat]=chats[currentChat]||[]
chats[currentChat].push(userHTML)

input.value=""

const loadingId="l"+Date.now()

chatbox.innerHTML+=`
<div class="bot-message" id="${loadingId}">
Assistant typing
<span class="typing"><span>.</span><span>.</span><span>.</span></span>
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

try{

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:"default_user",
question:message
})
})

const data=await res.json()

streamResponse(loadingId,data.response)

}catch{

document.getElementById(loadingId).innerHTML="Server error"

}

}

/* streaming effect */

function streamResponse(id,text){

const el=document.getElementById(id)

el.innerHTML="<b>Assistant:</b><br>"

let i=0

const interval=setInterval(()=>{

el.innerHTML+=text.charAt(i)

i++

if(i>=text.length){
clearInterval(interval)
Prism.highlightAll()
}

},15)

}

/* service worker */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/static/service-worker.js")
}

/* PWA install */

let deferredPrompt

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault()
deferredPrompt=e

const btn=document.getElementById("installBtn")
btn.style.display="inline"

btn.onclick=async()=>{
btn.style.display="none"
deferredPrompt.prompt()
await deferredPrompt.userChoice
}
})

</script>

</body>
</html>
```
