
<!DOCTYPE html>
<html>

<head>

<title>Smart AI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
background:#0f172a;
color:white;
}

/* sidebar */

#sidebar{
width:260px;
background:#020617;
padding:20px;
overflow:auto;
}

#chatList div{
padding:8px;
margin-bottom:6px;
background:#1e293b;
cursor:pointer;
border-radius:6px;
}

/* main */

#main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

#chatbox{
flex:1;
overflow:auto;
background:#1e293b;
padding:10px;
border-radius:8px;
}

.user{
background:#2563eb;
padding:10px;
margin:6px;
border-radius:8px;
max-width:70%;
margin-left:auto;
}

.bot{
background:#334155;
padding:10px;
margin:6px;
border-radius:8px;
max-width:70%;
}

/* voice buttons */

.voiceButtons{
margin-top:6px;
display:flex;
gap:6px;
}

/* input */

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

#userInput{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:8px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Chats</h3>

<button onclick="createChat()">New Chat</button>

<div id="chatList"></div>

</div>

<div id="main">

<h2>Smart Assistant</h2>

<div id="chatbox"></div>

<div id="inputArea">

<input id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">

<button onclick="startVoice()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* ---------- USER ---------- */

const user_id="default_user"

let conversation_id=null

/* ---------- VOICE ENGINE ---------- */

let speechInstance=null

function speak(text){

speechSynthesis.cancel()

speechInstance=new SpeechSynthesisUtterance(text)

speechInstance.lang="en-US"

speechSynthesis.speak(speechInstance)

}

function pauseVoice(){
speechSynthesis.pause()
}

function resumeVoice(){
speechSynthesis.resume()
}

function stopVoice(){
speechSynthesis.cancel()
}

/* ---------- VOICE INPUT ---------- */

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice input not supported")
return
}

let recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.onresult=function(event){

document.getElementById("userInput").value=
event.results[0][0].transcript

}

recognition.start()

}

/* ---------- CHAT SYSTEM ---------- */

async function createChat(){

const res=await fetch("/new_chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user_id})
})

const data=await res.json()

conversation_id=data.conversation_id

document.getElementById("chatbox").innerHTML=""

loadChats()

}

/* ---------- LOAD CHAT LIST ---------- */

async function loadChats(){

const res=await fetch("/chat_list/"+user_id)

const data=await res.json()

const list=document.getElementById("chatList")

list.innerHTML=""

data.chats.forEach(id=>{

const div=document.createElement("div")

div.innerText=id.substring(0,8)

div.onclick=()=>loadHistory(id)

list.appendChild(div)

})

}

/* ---------- LOAD CHAT HISTORY ---------- */

async function loadHistory(id){

conversation_id=id

const res=await fetch("/chat_history/"+id)

const data=await res.json()

const box=document.getElementById("chatbox")

box.innerHTML=""

data.history.forEach(msg=>{

if(msg.role==="user"){

box.innerHTML+=`<div class="user">${msg.message}</div>`

}else{

box.innerHTML+=`
<div class="bot">

${marked.parse(msg.message)}

<div class="voiceButtons">

<button onclick="speak(\`${msg.message}\`)">🔊</button>
<button onclick="pauseVoice()">⏸</button>
<button onclick="resumeVoice()">▶</button>
<button onclick="stopVoice()">⏹</button>

</div>

</div>
`

}

})

}

/* ---------- SEND MESSAGE ---------- */

function handleKey(e){

if(e.key==="Enter") sendMessage()

}

async function sendMessage(){

stopVoice()

if(!conversation_id){

await createChat()

}

const input=document.getElementById("userInput")

const message=input.value.trim()

if(!message) return

const box=document.getElementById("chatbox")

box.innerHTML+=`<div class="user">${message}</div>`

input.value=""

const res=await fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
user_id,
conversation_id,
question:message
})

})

const data=await res.json()

box.innerHTML+=`

<div class="bot">

${marked.parse(data.response)}

<div class="voiceButtons">

<button onclick="speak(\`${data.response}\`)">🔊</button>
<button onclick="pauseVoice()">⏸</button>
<button onclick="resumeVoice()">▶</button>
<button onclick="stopVoice()">⏹</button>

</div>

</div>

`

Prism.highlightAll()

box.scrollTop=box.scrollHeight

}

/* ---------- INIT ---------- */

loadChats()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/static/service-worker.js")
}

</script>

</body>
</html>
