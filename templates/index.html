```html
<!DOCTYPE html>
<html>

<head>

<title>Smart AI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b1220">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
color:white;
}

#sidebar{
width:240px;
background:#020617;
padding:20px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

#chatbox{
flex:1;
overflow:auto;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}

.user-message{
background:#2563eb;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
margin-left:auto;
}

.bot-message{
background:#334155;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
}

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

#userInput{
flex:1;
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Smart Assistant</h3>

<button onclick="clearChat()">New Chat</button>

</div>

<div id="main">

<h2>AI Assistant</h2>

<div id="chatbox"></div>

<div id="inputArea">

<input id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">

<button onclick="startVoice()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* ---------- VOICE INPUT ---------- */

let recognition

function startVoice(){

if(!('webkitSpeechRecognition' in window)){

alert("Voice input not supported in this browser")
return

}

recognition = new webkitSpeechRecognition()

recognition.lang="en-US"
recognition.continuous=false
recognition.interimResults=false

recognition.onresult=function(event){

const transcript=event.results[0][0].transcript

document.getElementById("userInput").value=transcript

}

recognition.start()

}

/* ---------- VOICE OUTPUT ---------- */

function speak(text){

if(!window.speechSynthesis) return

const speech=new SpeechSynthesisUtterance()

speech.text=text
speech.lang="en-US"
speech.rate=1
speech.pitch=1

speechSynthesis.speak(speech)

}

/* ---------- SEND MESSAGE ---------- */

function handleKey(e){

if(e.key==="Enter") sendMessage()

}

async function sendMessage(){

const input=document.getElementById("userInput")
const message=input.value.trim()

if(!message) return

const chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`
<div class="user-message"><b>You:</b> ${message}</div>
`

input.value=""

const loadingId="l"+Date.now()

chatbox.innerHTML+=`
<div class="bot-message" id="${loadingId}">
Assistant typing...
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

try{

const res=await fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:"default_user",
question:message
})

})

const data=await res.json()

const reply=data.response

document.getElementById(loadingId).innerHTML=
"<b>Assistant:</b><br>"+marked.parse(reply)

Prism.highlightAll()

/* AI SPEAKS */

speak(reply)

}catch{

document.getElementById(loadingId).innerHTML="Server error"

}

}

/* ---------- CLEAR CHAT ---------- */

function clearChat(){

document.getElementById("chatbox").innerHTML=""

}

/* ---------- SERVICE WORKER ---------- */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/static/service-worker.js")

}

</script>

</body>
</html>
