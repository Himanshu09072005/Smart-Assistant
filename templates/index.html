<!DOCTYPE html>
<html>

<head>

<title>Smart AI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
color:white;
}

#main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

#chatbox{
flex:1;
overflow:auto;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}

.user-message{
background:#2563eb;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
margin-left:auto;
}

.bot-message{
background:#334155;
padding:10px;
margin:8px;
border-radius:10px;
max-width:70%;
}

.voiceButtons{
margin-top:6px;
display:flex;
gap:6px;
}

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

#userInput{
flex:1;
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="main">

<h2>Smart AI Assistant</h2>

<div id="chatbox"></div>

<div id="inputArea">

<input id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">

<button onclick="startVoice()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* -------- VOICE ENGINE -------- */

let speechInstance=null

function speak(text){

speechSynthesis.cancel()

speechInstance=new SpeechSynthesisUtterance(text)

speechInstance.lang="en-US"
speechInstance.rate=1

speechSynthesis.speak(speechInstance)

}

function pauseVoice(){
speechSynthesis.pause()
}

function resumeVoice(){
speechSynthesis.resume()
}

function stopVoice(){
speechSynthesis.cancel()
}

/* -------- VOICE INPUT -------- */

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported")
return
}

let recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.onresult=function(event){

document.getElementById("userInput").value=
event.results[0][0].transcript

}

recognition.start()

}

/* -------- SEND MESSAGE -------- */

function handleKey(e){
if(e.key==="Enter") sendMessage()
}

async function sendMessage(){

stopVoice()

const input=document.getElementById("userInput")

const message=input.value.trim()

if(!message) return

const chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`
<div class="user-message"><b>You:</b> ${message}</div>
`

input.value=""

const loadingId="l"+Date.now()

chatbox.innerHTML+=`
<div class="bot-message" id="${loadingId}">
Assistant typing...
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

try{

const res=await fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:"default_user",
question:message
})

})

const data=await res.json()

const reply=data.response

document.getElementById(loadingId).innerHTML=`

<b>Assistant:</b><br>
${marked.parse(reply)}

<div class="voiceButtons">

<button onclick="speak(\`${reply}\`)">🔊 Listen</button>

<button onclick="pauseVoice()">⏸ Pause</button>

<button onclick="resumeVoice()">▶ Resume</button>

<button onclick="stopVoice()">⏹ Stop</button>

</div>

`

Prism.highlightAll()

}catch{

document.getElementById(loadingId).innerHTML="Server error"

}

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/static/service-worker.js")

}

</script>

</body>
</html>
