
<!DOCTYPE html>
<html>

<head>

<title>Smart AI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
background:#0f172a;
color:white;
}

#sidebar{
width:250px;
background:#020617;
padding:20px;
overflow:auto;
}

#chatList div{
padding:8px;
margin-bottom:6px;
background:#1e293b;
cursor:pointer;
border-radius:6px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

#chatbox{
flex:1;
overflow:auto;
background:#1e293b;
padding:10px;
border-radius:8px;
}

.user{
background:#2563eb;
padding:8px;
margin:6px;
border-radius:6px;
max-width:70%;
margin-left:auto;
}

.bot{
background:#334155;
padding:8px;
margin:6px;
border-radius:6px;
max-width:70%;
}

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

#userInput{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Chats</h3>

<button onclick="createChat()">New Chat</button>

<div id="chatList"></div>

</div>

<div id="main">

<h2>Smart Assistant</h2>

<div id="chatbox"></div>

<div id="inputArea">

<input id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const user_id="default_user"

let conversation_id=null


async function createChat(){

const res=await fetch("/new_chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user_id})
})

const data=await res.json()

conversation_id=data.conversation_id

document.getElementById("chatbox").innerHTML=""

loadChats()

}


async function loadChats(){

const res=await fetch("/chat_list/"+user_id)

const data=await res.json()

const list=document.getElementById("chatList")

list.innerHTML=""

data.chats.forEach(id=>{

const div=document.createElement("div")

div.innerText=id.substring(0,8)

div.onclick=()=>loadHistory(id)

list.appendChild(div)

})

}


async function loadHistory(id){

conversation_id=id

const res=await fetch("/chat_history/"+id)

const data=await res.json()

const box=document.getElementById("chatbox")

box.innerHTML=""

data.history.forEach(msg=>{

if(msg.role=="user"){

box.innerHTML+=`<div class="user">${msg.message}</div>`

}else{

box.innerHTML+=`<div class="bot">${msg.message}</div>`

}

})

}


function handleKey(e){

if(e.key==="Enter") sendMessage()

}


async function sendMessage(){

if(!conversation_id){

await createChat()

}

const input=document.getElementById("userInput")

const message=input.value.trim()

if(!message) return

const box=document.getElementById("chatbox")

box.innerHTML+=`<div class="user">${message}</div>`

input.value=""

const res=await fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
user_id,
conversation_id,
question:message
})

})

const data=await res.json()

box.innerHTML+=`<div class="bot">${data.response}</div>`

box.scrollTop=box.scrollHeight

}


loadChats()

</script>

</body>

</html>
